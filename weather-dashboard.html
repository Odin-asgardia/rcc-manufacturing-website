<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard</title>
    <style>
        body {
            background-color: #2C2C2C;
            color: #FFD700;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        h1 {
            text-align: center;
            margin-top: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .search {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .search input {
            padding: 10px;
            border: none;
            border-radius: 5px;
            width: 70%;
        }
        .search button {
            padding: 10px;
            background-color: #FFD700;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .weather-info {
            margin: 20px 0;
            padding: 20px;
            border: 1px solid #FFD700;
            border-radius: 5px;
        }
        .error {
            color: red;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Weather Dashboard</h1>
        <div class="search">
            <input type="text" id="locationInput" placeholder="Enter location...">
            <button onclick="getWeatherData()">Search</button>
        </div>
        <div class="weather-info" id="weatherInfo"></div>
        <div class="error" id="errorMessage"></div>
    </div>
    <script>
        async function getWeatherData() {
            const location = document.getElementById('locationInput').value;
            const weatherInfo = document.getElementById('weatherInfo');
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = '';
            weatherInfo.textContent = 'Loading...';

            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=&longitude=&hourly=temperature_2m,humidity_2m,wind_speed_10m,weathercode&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,weathercode&timezone=auto`);
                if (!response.ok) throw new Error('Weather data not found.');
                const data = await response.json();

                // Process and display the data here (for simplicity, showing only current data)
                const currentWeather = data.current_weather;
                weatherInfo.innerHTML = `<strong>Current Weather:</strong><br>
                    Temperature: ${currentWeather.temperature} °C<br>
                    Humidity: ${currentWeather.humidity} %<br>
                    Wind Speed: ${currentWeather.windspeed} km/h<br>
                    Conditions: ${currentWeather.weathercode}`;
            } catch (error) {
                errorMessage.textContent = error.message;
                weatherInfo.textContent = '';
            }
        }
    </script>
</body>
</html>
